<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CleanDriver — Screen 2: Download</title>
<style>
  :root{
    --font:"Segoe UI Variable","Segoe UI",system-ui,-apple-system,sans-serif;
    --mono:"Cascadia Code",Consolas,"SF Mono",ui-monospace,monospace;
    --r-card:8px; --r-ctrl:4px;
  }
  body[data-theme="light"]{
    --page:#E9E9E9;
    --win:#F3F3F3; --card:#FFFFFF; --border:#E5E5E5;
    --text:#1B1B1B; --text2:#5D5D5D;
    --accent:#2E7D32; --accent-hover:#276B2B; --on-accent:#FFFFFF;
    --warn-text:#9A6700; --warn-bg:#FFF8E1;
    --ctrl-bg:#FFFFFF; --ctrl-hover:#F5F5F5; --sel-bg:#EAF3EA;
    --track:#E5E5E5;
    --shadow:0 20px 48px rgba(0,0,0,.22);
    --cap-hover:rgba(0,0,0,.06); --close-hover:#C42B1C;
  }
  body[data-theme="dark"]{
    --page:#171717;
    --win:#202020; --card:#2B2B2B; --border:#3A3A3A;
    --text:#FFFFFF; --text2:#C5C5C5;
    --accent:#66BB6A; --accent-hover:#7BC97F; --on-accent:#103312;
    --warn-text:#F8D57E; --warn-bg:#3A3115;
    --ctrl-bg:#303030; --ctrl-hover:#383838; --sel-bg:#2C3A2D;
    --track:#3A3A3A;
    --shadow:0 20px 48px rgba(0,0,0,.5);
    --cap-hover:rgba(255,255,255,.08); --close-hover:#C42B1C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--font); background:var(--page); color:var(--text);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; padding:40px 24px; min-height:100vh;
    -webkit-font-smoothing:antialiased; font-size:14px; line-height:20px;
  }

  .toggle{display:inline-flex; padding:3px; gap:2px; border-radius:6px;
    background:var(--win); border:1px solid var(--border);}
  .toggle button{font:inherit; font-size:12px; color:var(--text2);
    border:0; background:transparent; padding:5px 14px; border-radius:4px; cursor:pointer;}
  .toggle button.on{background:var(--accent); color:var(--on-accent);}

  .window{width:960px; height:640px; flex:0 0 auto; background:var(--win); border-radius:8px;
    box-shadow:var(--shadow); display:flex; flex-direction:column; overflow:hidden;
    border:1px solid var(--border);}

  .titlebar{height:44px; flex:0 0 44px; display:flex; align-items:center;
    padding-left:14px; gap:10px; background:var(--win);}
  .glyph{width:18px; height:18px; border-radius:5px; background:var(--accent);
    display:flex; align-items:center; justify-content:center; flex:0 0 auto;}
  .glyph::after{content:""; width:8px; height:8px; border-radius:2px;
    border:2px solid var(--on-accent);}
  .appname{font-size:12px; font-weight:600; letter-spacing:.01em;}
  .tb-spacer{flex:1;}
  .toolbar{display:flex; gap:6px; margin-right:6px;}
  .tb-btn{font:inherit; font-size:12px; color:var(--text); background:var(--ctrl-bg);
    border:1px solid var(--border); border-radius:4px; padding:4px 10px; cursor:pointer;}
  .tb-btn:hover{background:var(--ctrl-hover);}
  .caption{display:flex; height:44px;}
  .cap{width:44px; height:44px; display:flex; align-items:center; justify-content:center;
    color:var(--text); cursor:default;}
  .cap:hover{background:var(--cap-hover);}
  .cap.close:hover{background:var(--close-hover); color:#fff;}
  .cap svg{width:11px; height:11px;}

  .content{flex:1; padding:12px 24px; overflow:hidden; display:flex; flex-direction:column;}
  .page-title{font-size:20px; font-weight:600; line-height:26px; margin:0;}
  .label{font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--text2); font-weight:600;}
  .caption-txt{font-size:12px; color:var(--text2);}

  .btn{font:inherit; font-size:13px; border-radius:var(--r-ctrl); padding:8px 16px; cursor:pointer; border:1px solid var(--border);}
  .btn.secondary{background:var(--ctrl-bg); color:var(--text);}
  .btn.secondary:hover{background:var(--ctrl-hover);}
  .btn.primary{background:var(--accent); color:var(--on-accent); border-color:var(--accent); font-weight:600;}
  .btn.primary:hover{background:var(--accent-hover);}
  .btn.disabled{opacity:.4; pointer-events:none;}
  .btn:focus-visible, .tb-btn:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  /* download panel */
  .dl-wrap{flex:1; display:flex; align-items:center; justify-content:center;}
  .dl-card{width:640px; background:var(--card); border:1px solid var(--border);
    border-radius:var(--r-card); padding:32px 32px 28px;}
  .dl-icon{width:48px; height:48px; border-radius:10px; background:var(--sel-bg);
    display:flex; align-items:center; justify-content:center; margin-bottom:16px;}
  .dl-icon svg{width:24px; height:24px; color:var(--accent);}
  .dl-title{font-size:20px; font-weight:600; line-height:26px;}
  .dl-sub{font-size:14px; color:var(--text2); margin-top:2px;}
  .bar-wrap{margin-top:24px;}
  .bar{height:8px; border-radius:6px; background:var(--track); overflow:hidden;}
  .bar-fill{height:100%; width:63%; background:var(--accent); border-radius:6px;}
  .bar-caption{display:flex; justify-content:space-between; margin-top:10px; font-size:13px; color:var(--text2);}
  .bar-caption b{color:var(--text); font-weight:600;}
  .dl-actions{margin-top:24px; display:flex;}

  .footer{flex:0 0 60px; height:60px; border-top:1px solid var(--border);
    display:flex; align-items:center; padding:0 24px; gap:16px;}
  .step{font-size:13px; color:var(--text2);}
  .step b{color:var(--text); font-weight:600;}
  .footer .sp{flex:1;}
  .foot-actions{display:flex; align-items:center; gap:12px;}
  .next-note{font-size:12px; color:var(--text2);}
</style>
</head>
<body data-theme="light">

  <div class="toggle" role="group" aria-label="Theme">
    <button id="t-light" class="on" onclick="setTheme('light')">Light</button>
    <button id="t-dark" onclick="setTheme('dark')">Dark</button>
  </div>

  <div class="window">
    <div class="titlebar">
      <div class="glyph"></div>
      <div class="appname">CleanDriver</div>
      <div class="tb-spacer"></div>
      <div class="toolbar">
        <button class="tb-btn">Save preset…</button>
        <button class="tb-btn">Load preset…</button>
      </div>
      <div class="caption">
        <div class="cap"><svg viewBox="0 0 10 10"><line x1="1" y1="5" x2="9" y2="5" stroke="currentColor" stroke-width="1"/></svg></div>
        <div class="cap close"><svg viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1"/></svg></div>
      </div>
    </div>

    <div class="content">
      <div class="dl-wrap">
        <div class="dl-card">
          <div class="dl-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3 v11 M7 10 l5 5 5-5"/><path d="M4 18 v2 a1 1 0 0 0 1 1 h14 a1 1 0 0 0 1-1 v-2"/>
            </svg>
          </div>
          <div class="dl-title">Downloading driver package</div>
          <div class="dl-sub">572.16 WHQL — 812 MB</div>

          <div class="bar-wrap">
            <div class="bar"><div class="bar-fill"></div></div>
            <div class="bar-caption">
              <span><b>512 MB</b> of 812 MB</span>
              <span>41.2 MB/s</span>
            </div>
          </div>

          <div class="dl-actions">
            <button class="btn secondary">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="step">Step <b>2</b> of 5 — Download</div>
      <div class="sp"></div>
      <div class="foot-actions">
        <span class="next-note">continues automatically when complete</span>
        <button class="btn secondary">Back</button>
        <button class="btn primary disabled">Next</button>
      </div>
    </div>
  </div>

<script>
  function setTheme(t){
    document.body.setAttribute('data-theme', t);
    document.getElementById('t-light').classList.toggle('on', t==='light');
    document.getElementById('t-dark').classList.toggle('on', t==='dark');
  }
</script>
</body>
</html>
