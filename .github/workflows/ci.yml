name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-smoke:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: the whitespace check diffs against the push/PR base, which the
          # default shallow (depth 1) clone does not fetch (HEAD~1 was "unknown revision").
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build (Release)
        run: dotnet build nvcleanstall/CleanDriver.csproj -c Release

      - name: Test (xunit — required once CleanDriver.Tests exists)
        shell: pwsh
        run: |
          if (Test-Path 'nvcleanstall/CleanDriver.Tests/CleanDriver.Tests.csproj') {
            dotnet test nvcleanstall/CleanDriver.Tests/CleanDriver.Tests.csproj -c Release --logger 'console;verbosity=normal'
          } else {
            Write-Host '::warning::No test project yet (pre-GAP-01 baseline). This step becomes a hard gate when nvcleanstall/CleanDriver.Tests exists.'
          }

      - name: Headless smoke test (server boots, catalog serves)
        shell: pwsh
        run: |
          $proc = Start-Process dotnet -ArgumentList 'run','--project','nvcleanstall','-c','Release','--no-build','--','--headless' -PassThru -NoNewWindow
          try {
            $ok = $false
            foreach ($i in 1..30) {
              Start-Sleep -Seconds 2
              try {
                $resp = Invoke-RestMethod -Uri 'http://localhost:4780/api/catalog' -TimeoutSec 5
                if ($resp.releases.Count -ge 1) { $ok = $true; break }
              } catch { }
            }
            if (-not $ok) { throw 'Server did not serve /api/catalog within 60s' }
            Write-Host "Smoke OK: catalog returned $($resp.releases.Count) release(s), newest $($resp.releases[0].version)"
            $sys = Invoke-RestMethod -Uri 'http://localhost:4780/api/system' -TimeoutSec 5
            Write-Host "GPU detection path: $($sys.detectedVia)"
          }
          finally {
            if ($proc -and -not $proc.HasExited) { Stop-Process -Id $proc.Id -Force }
            Get-Process CleanDriver -ErrorAction SilentlyContinue | Stop-Process -Force
          }

      - name: Whitespace check (git diff --check)
        shell: bash
        # Runs on push (post-merge) and pull_request (pre-merge gate, per CLAUDE.md).
        # Values are commit SHAs from the event; passed via env and quoted regardless.
        env:
          PUSH_BASE: ${{ github.event.before }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ '${{ github.event_name }}' = 'pull_request' ]; then base="$PR_BASE"; else base="$PUSH_BASE"; fi
          # Fall back to the parent commit if the base is empty / all-zeros / unfetched.
          if [ -z "$base" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD~1)"
          fi
          echo "Checking whitespace in ${base}..HEAD"
          git diff --check "$base" HEAD
